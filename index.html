<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/nta-icon.png" />
    <title>NTA</title>

    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link
      rel="preconnect"
      crossorigin="anonymous"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      crossorigin="anonymous"
      href="https://fonts.gstatic.com"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0"
    />
    <link rel="stylesheet" href="/styles/_all.css" />
  </head>
  <body>
    <div id="sidebar" class="sidebar">
      <div class="inbox">
        <div class="actions">
          <span class="title">Inbox</span>
        </div>
        <ul class="items"></ul>
      </div>
    </div>
    <div class="edit-area">
      <div class="editor-title-bar">
        <div class="editor-title" spellcheck="false"></div>
        <!-- TODO: enable when I will be adding properties support -->
        <!-- <button class="show-properties">
          <div class="open">
            <span class="material-symbols-outlined">unfold_more</span>
          </div>
          <div class="close">
            <span class="material-symbols-outlined">unfold_less</span>
          </div>
        </button> -->
      </div>
      <div class="doc-properties">
        <div class="doc-properties-content">
          <div style="padding: 8px">
            type:
            <select>
              <option value="inbox">Inbox</option>
              <option value="note">Note</option>
              <option value="task">Task</option>
              <option value="event">Event</option>
            </select>
            <br />
          </div>
        </div>
      </div>
      <div class="editor" spellcheck="false"></div>
    </div>
    <div class="bottom-bar">
      <button class="collapse-sidebar">
        <div class="open">
          <span class="material-symbols-outlined">left_panel_close</span>
        </div>
        <div class="close">
          <span class="material-symbols-outlined">left_panel_open</span>
        </div>
      </button>
      <button class="open-command-palette">
        <div class="online">
          <span class="material-symbols-outlined">bolt</span>
        </div>
        <div class="offline">
          <span class="material-symbols-outlined">wifi_off</span>
        </div>
      </button>
    </div>
    <div class="over-keyboard-bar">
      <button id="tab-btn" class="okb-btn">*&gt;</button>
      <button id="untab-btn" class="okb-btn">*&lt;</button>
      <button id="undo-btn" class="okb-btn">undo</button>
      <button id="redo-btn" class="okb-btn">redo</button>
    </div>
    <script type="module" src="./src/client/main.ts"></script>
  </body>
</html>
