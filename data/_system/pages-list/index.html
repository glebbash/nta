<p id="root"></p>

<script type="module">
  import { h, Component, render } from 'https://unpkg.com/preact?module';
  import htm from 'https://unpkg.com/htm?module';

  // Initialize htm with Preact
  const html = htm.bind(h);

  function App(props) {
    const pageList = [
      { name: '/', src: 'pages' },
      { name: 'Page 1', src: 'pages/page-1.html' },
      { name: 'Page 2', src: 'pages/page-2/index.html' },
      { name: '...', src: 'pages' },
    ];

    const pageItems = pageList.map(pageInfo => html`
      <li class="list-group-item"><page-link src="${pageInfo.src}">${pageInfo.name}</page-link></li>
    `);

    return html`
      <div class="h-100 p-1" style="background-color: var(--bs-gray-400)">
        <ul class="list-group">
          ${pageItems}
        </ul>
      </div>
      `;
  }

  render(html`<${App} />`, document.getElementById("root").parentElement);
</script>
