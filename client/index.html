<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NTA</title>

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0"
    />
    <link rel="stylesheet" href="./src/styles/_all.css" />
  </head>
  <body>
    <div id="sidebar" class="sidebar">
      <div class="inbox">
        <div class="actions">
          <span class="title">Inbox</span>
          <button class="create">
            <span class="material-symbols-outlined">add</span>
          </button>
        </div>
        <ul class="items"></ul>
      </div>
    </div>
    <div class="edit-area">
      <div class="editor-title-bar">
        <div class="editor-title" spellcheck="false"></div>
        <button class="show-properties">
          <div class="open">
            <span class="material-symbols-outlined">unfold_more</span>
          </div>
          <div class="close">
            <span class="material-symbols-outlined">unfold_less</span>
          </div>
        </button>
      </div>
      <div class="doc-properties">
        <div class="doc-properties-content">
          <div style="padding: 8px">
            <span style="font-family: monospace; font-size: 16px"></span>
              // TODO: add properties here
            </span>
          </div>
        </div>
      </div>
      <div class="editor" spellcheck="false"></div>
    </div>
    <div class="bottom-bar">
      <button class="collapse-sidebar">
        <div class="open">
          <span class="material-symbols-outlined">left_panel_close</span>
        </div>
        <div class="close">
          <span class="material-symbols-outlined">left_panel_open</span>
        </div>
      </button>
      <div class="dotdotdot-button">
        <button>
          <span class="material-symbols-outlined">more_horiz</span>
        </button>
        <div class="dotdotdot-content">
          <button class="delete">Delete</button>
        </div>
      </div>
    </div>
    <div class="over-keyboard-bar">
      <button id="tab-btn" class="okb-btn">*&gt;</button>
      <button id="untab-btn" class="okb-btn">*&lt;</button>
      <button id="undo-btn" class="okb-btn">undo</button>
      <button id="redo-btn" class="okb-btn">redo</button>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
